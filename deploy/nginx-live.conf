server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name softkoredigital.co.za;

    ssl_certificate /etc/letsencrypt/live/softkoredigital.co.za/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/softkoredigital.co.za/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://www.softkoredigital.co.za$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name www.softkoredigital.co.za 128.140.50.160;

    root /var/www/softkoredigital/out;
    index index.html;

    ssl_certificate /etc/letsencrypt/live/softkoredigital.co.za/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/softkoredigital.co.za/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    include /etc/nginx/snippets/softkore-redirects.conf;

    location ~ ^(.*/)?[^/.]+$ {
        if (-d $request_filename) {
            return 301 $uri/;
        }
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 256;
}

server {
    listen 80;
    listen [::]:80;
    server_name softkoredigital.co.za;

    return 301 https://www.softkoredigital.co.za$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name www.softkoredigital.co.za;

    return 301 https://www.softkoredigital.co.za$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name 128.140.50.160;

    return 404;
}
